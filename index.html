<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantis Architecture - Hệ Thống Chuyên Gia Phong Thủy</title>
    <style>
        :root { --primary: #0a2342; --accent: #c5a059; --bg: #f4f7f6; --white: #ffffff; --good: #27ae60; --bad: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        .container { max-width: 1000px; margin: auto; background: var(--white); min-height: 100vh; box-shadow: 0 0 50px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: var(--white); padding: 30px 15px; text-align: center; border-bottom: 4px solid var(--accent); }
        .tabs { display: flex; background: #1a3a5a; overflow-x: auto; sticky: top; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #ccc; min-width: 120px; transition: 0.3s; font-size: 13px; }
        .tab.active { background: var(--white); color: var(--primary); border-top: 3px solid var(--accent); }
        .content-section { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .input-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-top: 5px; }

        /* Ruler Style */
        .ruler-container { position: relative; height: 120px; background: #eee; border: 1px solid #ccc; overflow: hidden; margin: 20px 0; border-radius: 8px; }
        .ruler-tape { position: absolute; height: 100%; display: flex; transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .ruler-mark { min-width: 100px; height: 100%; border-left: 1px solid #999; position: relative; padding: 5px; box-sizing: border-box; font-size: 10px; }
        .cung-cat { background: #d4edda; color: #155724; border-top: 5px solid #28a745; }
        .cung-hung { background: #f8d7da; color: #721c24; border-top: 5px solid #dc3545; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: red; z-index: 10; box-shadow: 0 0 5px rgba(255,0,0,0.5); }

        .card { border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #fff; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .bg-good { background: var(--good); color: white; }
        .bg-bad { background: var(--bad); color: white; }
        
        .table-view { width: 100%; border-collapse: collapse; }
        .table-view th, .table-view td { padding: 10px; border: 1px solid #eee; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 20px;">ATLANTIS ARCHITECTURE</h1>
        <div style="color: var(--accent); font-size: 12px; margin-top: 5px;">Hệ Thống Trợ Lý Thiết Kế & Phong Thủy Chuyên Sâu</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="openTab(event, 'tabXayDung')">XEM NĂM/THÁNG</div>
        <div class="tab" onclick="openTab(event, 'tabBatTrach')">BÁT TRẠCH</div>
        <div class="tab" onclick="openTab(event, 'tabLuBan')">THƯỚC LỖ BAN</div>
    </div>

    <div id="tabXayDung" class="content-section active">
        <div class="input-box">
            <div class="field"><label>Năm sinh</label><input type="number" id="ns" value="1994" oninput="updateAll()"></div>
            <div class="field"><label>Năm dự kiến</label><input type="number" id="nx" value="2026" oninput="updateAll()"></div>
        </div>
        <div id="hanResult"></div>
        <h3>Tháng Đại Cát Khởi Công (Dự kiến)</h3>
        <div id="monthResult" class="input-box" style="background:white; grid-template-columns: repeat(4, 1fr);"></div>
    </div>

    <div id="tabBatTrach" class="content-section">
        <div class="input-box">
            <div class="field">
                <label>Giới tính</label>
                <select id="gt" onchange="updateAll()">
                    <option value="nam">Nam</option>
                    <option value="nu">Nữ</option>
                </select>
            </div>
        </div>
        <div id="batTrachInfo"></div>
        <table class="table-view">
            <thead><tr style="background:#f2f2f2"><th>Hướng</th><th>Cung</th><th>Thủy Pháp (Nước/Khô)</th></tr></thead>
            <tbody id="batTrachTable"></tbody>
        </table>
    </div>

    <div id="tabLuBan" class="content-section">
        <div style="text-align: center; margin-bottom: 20px;">
            <label>NHẬP KÍCH THƯỚC (mm)</label><br>
            <input type="number" id="lbInput" value="810" style="font-size: 24px; width: 150px; text-align: center; color: var(--primary); font-weight: bold;" oninput="drawRuler()">
        </div>
        
        <div class="ruler-container">
            <div class="pointer"></div>
            <div id="rulerTape" class="ruler-tape"></div>
        </div>
        <div id="lbDetail" style="text-align:center; font-weight:bold; color:var(--primary)"></div>
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        let i, content, tabs;
        content = document.getElementsByClassName("content-section");
        for (i = 0; i < content.length; i++) content[i].classList.remove("active");
        tabs = document.getElementsByClassName("tab");
        for (i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function updateAll() {
        const ns = parseInt(document.getElementById('ns').value);
        const nx = parseInt(document.getElementById('nx').value);
        const gt = document.getElementById('gt').value;
        const tuoiMu = nx - ns + 1;

        // Kim Lau & Hoang Oc Logic
        const kl = (tuoiMu % 9 === 1 || tuoiMu % 9 === 3 || tuoiMu % 9 === 6 || tuoiMu % 9 === 8);
        const hoIdx = (tuoiMu - 10) % 6;
        const hoBad = [2, 4, 5].includes(hoIdx < 0 ? 0 : hoIdx);
        
        document.getElementById('hanResult').innerHTML = `
            <div class="card">
                <b>Năm ${nx} - Tuổi Mụ: ${tuoiMu}</b><br>
                <span class="status-badge ${kl?'bg-bad':'bg-good'}">Kim Lâu: ${kl?'Phạm':'Tốt'}</span>
                <span class="status-badge ${hoBad?'bg-bad':'bg-good'}">Hoang Ốc: ${hoBad?'Xấu':'Tốt'}</span>
            </div>
        `;

        // Thang Tot (Mau)
        let months = "";
        for(let i=1; i<=12; i++) {
            let isGood = [1, 2, 5, 9, 11].includes(i);
            months += `<div style="text-align:center; padding:10px; border:1px solid #eee; border-radius:5px; background:${isGood?'#eafaf1':'#fff'}">
                Tháng ${i}<br><small>${isGood?'Đại Cát':'Bình'}</small>
            </div>`;
        }
        document.getElementById('monthResult').innerHTML = months;

        // Bat Trach & Thuy Phap
        let sum = 0; String(ns).split('').forEach(d => sum += parseInt(d));
        let magic = sum % 9; if(magic === 0) magic = 9;
        let cV = (gt==='nam') ? (11-magic) : (4+magic);
        if(cV>9) cV-=9; if(cV<1) cV+=9;
        const cung = ["Khảm", "Khôn", "Chấn", "Tốn", "Khôn", "Càn", "Đoài", "Cấn", "Ly"][cV-1];
        
        const batTrachData = {
            "Càn": { "Tây": "Sinh Khí", "Đông Bắc": "Thiên Y", "Tây Bắc": "Phục Vị", "Tây Nam": "Diên Niên", "Nam": "Tuyệt Mệnh", "Đông": "Ngũ Quỷ", "Đông Nam": "Họa Hại", "Bắc": "Lục Sát" },
            "Cấn": { "Tây Nam": "Sinh Khí", "Tây Bắc": "Thiên Y", "Đông Bắc": "Phục Vị", "Tây": "Diên Niên", "Đông Nam": "Tuyệt Mệnh", "Bắc": "Ngũ Quỷ", "Nam": "Họa Hại", "Đông": "Lục Sát" }
            // Gia chủ có thể thêm data các cung khác tại đây
        };

        const data = batTrachData[cung] || batTrachData["Càn"];
        let tableHtml = "";
        for (let h in data) {
            let isXau = ["Tuyệt Mệnh", "Ngũ Quỷ", "Họa Hại", "Lục Sát"].includes(data[h]);
            tableHtml += `<tr>
                <td>${h}</td>
                <td style="color:${isXau?'red':'green'}; font-weight:bold">${data[h]}</td>
                <td>${isXau ? '<b>KHÔ:</b> Kho, WC, Bể phốt (Trấn hung)' : '<b>ƯỚT:</b> Cửa, Bể cá, Sân (Kích tài)'}</td>
            </tr>`;
        }
        document.getElementById('batTrachTable').innerHTML = tableHtml;
    }

    // Thước Lỗ Ban Drawing
    function drawRuler() {
        const val = parseFloat(document.getElementById('lbInput').value) || 0;
        const tape = document.getElementById('rulerTape');
        const cycle = 522; // Thước 52.2cm
        const cungNames = ["Quý Nhân", "Hiểm Họa", "Thiên Tai", "Thiên Tài", "Phúc Lộc", "Cô Độc", "Thiên Tặc", "Tế Tự"];
        const cungColors = ["cung-cat", "cung-hung", "cung-hung", "cung-cat", "cung-cat", "cung-hung", "cung-hung", "cung-cat"];

        let html = "";
        // Vẽ 5 chu kỳ thước để có thể trượt
        for(let i=0; i<15; i++) {
            let idx = i % 8;
            html += `<div class="ruler-mark ${cungColors[idx]}">
                <b>${i*65}</b><br>${cungNames[idx]}
            </div>`;
        }
        tape.innerHTML = html;
        
        // Dịch chuyển thước
        const offset = (val * (100/65)); 
        tape.style.transform = `translateX(calc(50% - ${offset}px))`;
        
        let currentCung = cungNames[Math.floor((val % cycle) / 65)];
        document.getElementById('lbDetail').innerText = "Kích thước " + val + "mm rơi vào cung: " + currentCung;
    }

    window.onload = () => { updateAll(); drawRuler(); };
</script>
</body>
</html>
