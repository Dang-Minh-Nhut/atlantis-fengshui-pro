<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlantis Architecture - Chuyên Gia Phong Thủy</title>
    <style>
        :root { --primary: #0a2342; --accent: #c5a059; --bg: #f4f7f6; --white: #ffffff; --good: #27ae60; --bad: #e74c3c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: auto; background: var(--white); min-height: 100vh; box-shadow: 0 0 50px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: var(--white); padding: 25px; text-align: center; border-bottom: 4px solid var(--accent); }
        .tabs { display: flex; background: #1a3a5a; overflow-x: auto; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #ccc; min-width: 120px; transition: 0.3s; font-size: 13px; text-transform: uppercase; }
        .tab.active { background: var(--white); color: var(--primary); border-top: 3px solid var(--accent); }
        .content-section { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .input-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; width: 100%; box-sizing: border-box; }

        /* Ruler - Đã fix lỗi lệch số */
        .ruler-container { position: relative; height: 130px; background: #333; border: 2px solid #000; overflow: hidden; margin: 20px 0; border-radius: 5px; }
        .ruler-tape { position: absolute; height: 100%; display: flex; transition: transform 0.4s ease-out; left: 50%; }
        .ruler-mark { min-width: 65.25px; height: 100%; border-left: 1px solid rgba(0,0,0,0.2); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; box-sizing: border-box; }
        .cung-cat { background: #d4edda; color: #155724; border-bottom: 8px solid #28a745; }
        .cung-hung { background: #f8d7da; color: #721c24; border-bottom: 8px solid #dc3545; }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: #ff0000; z-index: 10; box-shadow: 0 0 10px rgba(255,0,0,0.7); transform: translateX(-50%); }

        .card { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #fff; }
        .grid-days { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 5px; margin-top: 10px; }
        .day-box { padding: 10px 5px; text-align: center; border-radius: 4px; border: 1px solid #ddd; font-size: 12px; cursor: pointer; }
        .day-good { background: #eafaf1; border-color: #2ecc71; color: #27ae60; font-weight: bold; }
        .day-bad { color: #999; background: #fdfdfd; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 22px;">ATLANTIS ARCHITECTURE</h1>
        <div style="color: var(--accent); font-size: 12px; margin-top: 5px; font-weight: bold;">HỆ THỐNG TRỢ LÝ PHONG THỦY CHUYÊN SÂU 3.0</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="openTab(event, 'tabXayDung')">XEM NĂM/THÁNG/NGÀY</div>
        <div class="tab" onclick="openTab(event, 'tabLuBan')">THƯỚC LỖ BAN</div>
    </div>

    <div id="tabXayDung" class="content-section active">
        <div class="input-box">
            <div><label>Năm sinh</label><input type="number" id="ns" value="1994" oninput="updateAll()"></div>
            <div><label>Năm xây dựng</label><input type="number" id="nx" value="2026" oninput="updateAll()"></div>
            <div><label>Tháng dự kiến</label>
                <select id="monthSelect" onchange="updateDays()">
                    <option value="1">Tháng 1 (Đại Cát)</option>
                    <option value="2">Tháng 2 (Đại Cát)</option>
                    <option value="3">Tháng 3</option><option value="4">Tháng 4</option>
                    <option value="5">Tháng 5 (Đại Cát)</option><option value="6">Tháng 6</option>
                    <option value="7">Tháng 7</option><option value="8">Tháng 8</option>
                    <option value="9">Tháng 9 (Đại Cát)</option><option value="10">Tháng 10</option>
                    <option value="11">Tháng 11 (Đại Cát)</option><option value="12">Tháng 12</option>
                </select>
            </div>
        </div>
        <div id="hanResult"></div>
        <div class="card">
            <h4 style="margin:0 0 10px 0; color: var(--primary);">Ngày Tốt Khởi Công Trong Tháng (Âm Lịch)</h4>
            <div id="daysList" class="grid-days"></div>
            <p style="font-size: 11px; color: #666; margin-top: 10px;">* Ngày xanh đậm: Ngày Hoàng Đạo, hợp tuổi khởi công.</p>
        </div>
    </div>

    <div id="tabLuBan" class="content-section">
        <div style="text-align: center; margin-bottom: 20px;">
            <label style="font-weight: bold; color: var(--primary);">NHẬP KÍCH THƯỚC (mm)</label><br>
            <input type="number" id="lbInput" value="810" style="font-size: 32px; width: 180px; text-align: center; color: var(--primary); font-weight: bold; border: 2px solid var(--accent); margin-top:10px;" oninput="drawRuler()">
        </div>
        
        <div class="ruler-container">
            <div class="pointer"></div>
            <div id="rulerTape" class="ruler-tape"></div>
        </div>
        <div id="lbDetail" style="text-align:center; font-size: 18px; font-weight:bold; color:var(--primary); padding: 10px; background: #f0f4f8; border-radius: 5px;"></div>
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        let i, content, tabs;
        content = document.getElementsByClassName("content-section");
        for (i = 0; i < content.length; i++) content[i].classList.remove("active");
        tabs = document.getElementsByClassName("tab");
        for (i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function updateAll() {
        const ns = parseInt(document.getElementById('ns').value);
        const nx = parseInt(document.getElementById('nx').value);
        const tuoiMu = nx - ns + 1;
        const kl = [1, 3, 6, 8].includes(tuoiMu % 9);
        const hoIdx = (tuoiMu - 10) % 6;
        const isHO = [2, 4, 5].includes(hoIdx < 0 ? 0 : hoIdx);

        document.getElementById('hanResult').innerHTML = `
            <div class="card" style="display: flex; justify-content: space-around; text-align:center;">
                <div><b>Tuổi Mụ</b><br><span style="font-size:20px; color:var(--primary)">${tuoiMu}</span></div>
                <div><b>Kim Lâu</b><br><span style="color:${kl? 'red':'green'}">${kl?'PHẠM':'TỐT'}</span></div>
                <div><b>Hoang Ốc</b><br><span style="color:${isHO? 'red':'green'}">${isHO?'PHẠM':'TỐT'}</span></div>
            </div>
        `;
        updateDays();
    }

    function updateDays() {
        const days = [2, 6, 9, 12, 16, 18, 22, 26, 29]; // Giả lập ngày tốt
        let html = "";
        for(let i=1; i<=30; i++) {
            let isG = days.includes(i);
            html += `<div class="day-box ${isG?'day-good':'day-bad'}">${i}</div>`;
        }
        document.getElementById('daysList').innerHTML = html;
    }

    function drawRuler() {
        const val = parseFloat(document.getElementById('lbInput').value) || 0;
        const tape = document.getElementById('rulerTape');
        const cungWidth = 65.25; // Fix tỷ lệ chuẩn 522mm / 8 cung
        const cungNames = ["Quý Nhân", "Hiểm Họa", "Thiên Tai", "Thiên Tài", "Phúc Lộc", "Cô Độc", "Thiên Tặc", "Tế Tự"];
        const cungColors = ["cung-cat", "cung-hung", "cung-hung", "cung-cat", "cung-cat", "cung-hung", "cung-hung", "cung-cat"];

        let html = "";
        for(let i=0; i<40; i++) {
            let idx = i % 8;
            html += `<div class="ruler-mark ${cungColors[idx]}">
                <b style="position:absolute; top:5px; left:2px">${i*65}</b>
                <span style="font-weight:bold; font-size:11px">${cungNames[idx]}</span>
            </div>`;
        }
        tape.innerHTML = html;
        const offset = val * (cungWidth / 65.25);
        tape.style.transform = `translateX(-${offset}px)`;
        
        let currentIdx = Math.floor((val % 522) / 65.25);
        document.getElementById('lbDetail').innerHTML = `Kích thước <b>${val}mm</b> rơi vào: <span style="color:${currentIdx % 3 === 0 || currentIdx === 4 || currentIdx === 7 ? 'green':'red'}">${cungNames[currentIdx]}</span>`;
    }

    window.onload = () => { updateAll(); drawRuler(); };
</script>
</body>
</html>
